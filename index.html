<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>まとめノート ｜ m-note</title>
<meta name="description" content="個人的につくっている学習ノートの入口。マインドフルネスと量子力学のまとめノートを公開しています。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff; --ink:#141414; --muted:#8f8f8f; --faint:#b9b9b9;
    --line:#e7e7e7; --hover:#f6f6f6;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#0d0d0d; --ink:#f1f1f1; --muted:#8a8a8a; --faint:#5a5a5a;
      --line:#232323; --hover:#161616; }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{font-family:"Noto Sans JP",system-ui,sans-serif;background:var(--bg);color:var(--ink);
    line-height:1.8;min-height:100vh;display:flex;flex-direction:column;letter-spacing:.01em}
  .wrap{width:100%;max-width:680px;margin:0 auto;padding:0 28px}

  /* top bar */
  .topbar{padding:26px 0}
  .mark{font-weight:700;font-size:.9rem;letter-spacing:.14em}
  .mark .dot{color:var(--faint)}

  /* intro */
  main{flex:1;display:flex;flex-direction:column;justify-content:center;padding:40px 0}
  .kicker{font-size:.7rem;font-weight:700;letter-spacing:.28em;color:var(--muted);margin-bottom:22px}
  h1{font-family:"Noto Serif JP",serif;font-weight:600;font-size:clamp(1.8rem,5.4vw,2.7rem);
    line-height:1.5;letter-spacing:.02em}
  .lead{margin-top:22px;color:var(--muted);font-size:1rem;font-weight:400;max-width:34em}

  /* list */
  .list{margin-top:56px;border-top:1px solid var(--line)}
  .row{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:22px;
    padding:26px 8px;border-bottom:1px solid var(--line);text-decoration:none;color:inherit;
    transition:background .25s,padding .25s}
  .row:hover{background:var(--hover);padding-left:16px;padding-right:16px}
  .idx{font-family:"Noto Serif JP",serif;font-weight:500;font-size:1rem;color:var(--faint);
    letter-spacing:.05em}
  .cat{font-size:.66rem;font-weight:700;letter-spacing:.22em;color:var(--muted);display:block;margin-bottom:7px}
  .ttl{font-family:"Noto Serif JP",serif;font-weight:600;font-size:1.35rem;color:var(--ink);line-height:1.3}
  .desc{display:block;margin-top:8px;font-size:.86rem;color:var(--muted);font-weight:400}
  .arrow{font-size:1.05rem;color:var(--faint);transition:transform .25s,color .25s}
  .row:hover .arrow{transform:translateX(5px);color:var(--ink)}

  /* footer */
  footer{padding:44px 0 40px;color:var(--muted)}
  .foot-line{display:flex;justify-content:space-between;align-items:center;gap:16px;
    font-size:.8rem;border-top:1px solid var(--line);padding-top:22px;flex-wrap:wrap}
  .foot-line a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--line);padding-bottom:1px}
  .foot-line a:hover{border-color:var(--ink)}
  .disc{margin-top:16px;font-size:.72rem;color:var(--faint);line-height:1.7;max-width:46em}

  @media(max-width:520px){
    .row{grid-template-columns:auto 1fr;gap:16px}
    .arrow{display:none}
    main{padding:20px 0}
    .list{margin-top:40px}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="wrap"><span class="mark">m<span class="dot">-</span>note</span></div>
</div>

<main>
  <div class="wrap">
    <p class="kicker">PERSONAL NOTES</p>
    <h1>気になったことを、<br>自分の言葉でまとめる。</h1>
    <p class="lead">個人的につくっている学習ノートの入口です。気になるほうから、どうぞ。</p>

    <nav class="list">
      <a class="row" href="mindfulness/">
        <span class="idx">01</span>
        <span class="body">
          <span class="cat">MINDFULNESS</span>
          <span class="ttl">マインドフルネス</span>
          <span class="desc">瞑想・ACT・セルフアクセプタンスを、実践方法とコラムで整理したノート。</span>
        </span>
        <span class="arrow">→</span>
      </a>
      <a class="row" href="quantum/">
        <span class="idx">02</span>
        <span class="body">
          <span class="cat">PHYSICS</span>
          <span class="ttl">量子力学</span>
          <span class="desc">常識が通じない“ミクロの世界のルール”を、やさしく学べるノート。</span>
        </span>
        <span class="arrow">→</span>
      </a>
    </nav>
  </div>
</main>

<footer>
  <div class="wrap">
    <div class="foot-line">
      <span>© 2026 m-note</span>
      <a href="https://github.com/doesman1227" target="_blank" rel="noopener">GitHub</a>
    </div>
    <p class="disc">いずれのサイトも、専門家ではない個人が学習・情報提供のために作った個人的なまとめです。内容の正確性を保証するものではありません。</p>
  </div>
</footer>

</body>
</html>
